name: Build FreeType

on:
  workflow_dispatch:
    inputs:
      freetype_version:
        description: "FreeType version to build (e.g. 2.13.3)"
        required: true
        default: "2.13.3"

env:
  VERSION: ${{ github.event.inputs.freetype_version }}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-linux-gnu
          - os: windows-latest
            target: x86_64-windows-gnu
          - os: macos-15-intel
            target: x86_64-macos
            cmake_extra: -DCMAKE_OSX_ARCHITECTURES=x86_64 -DCMAKE_INSTALL_NAME_DIR=@executable_path
          - os: macos-latest
            target: aarch64-macos
            cmake_extra: -DCMAKE_OSX_ARCHITECTURES=arm64 -DCMAKE_INSTALL_NAME_DIR=@executable_path

    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}

    steps:
      - name: Download FreeType source
        run: |
          curl -L -o freetype.tar.gz "https://download.savannah.gnu.org/releases/freetype/freetype-${{ env.VERSION }}.tar.gz"
          tar xzf freetype.tar.gz

      - name: Install MinGW clang toolchain
        if: matrix.target == 'x86_64-windows-gnu'
        uses: msys2/setup-msys2@v2
        with:
          msystem: CLANG64
          install: mingw-w64-clang-x86_64-clang mingw-w64-clang-x86_64-cmake mingw-w64-clang-x86_64-ninja

      - name: Build static library (Unix)
        if: runner.os != 'Windows'
        run: |
          cmake -S freetype-${{ env.VERSION }} -B build-static \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=clang \
            -DBUILD_SHARED_LIBS=OFF \
            -DFT_DISABLE_BZIP2=ON \
            -DFT_DISABLE_BROTLI=ON \
            -DFT_DISABLE_HARFBUZZ=ON \
            -DFT_DISABLE_PNG=ON \
            -DFT_DISABLE_ZLIB=ON \
            ${{ matrix.cmake_extra }}
          cmake --build build-static --config Release

      - name: Build shared library (Unix)
        if: runner.os != 'Windows'
        run: |
          cmake -S freetype-${{ env.VERSION }} -B build-shared \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=clang \
            -DBUILD_SHARED_LIBS=ON \
            -DFT_DISABLE_BZIP2=ON \
            -DFT_DISABLE_BROTLI=ON \
            -DFT_DISABLE_HARFBUZZ=ON \
            -DFT_DISABLE_PNG=ON \
            -DFT_DISABLE_ZLIB=ON \
            ${{ matrix.cmake_extra }}
          cmake --build build-shared --config Release

      - name: Build static library (Windows)
        if: matrix.target == 'x86_64-windows-gnu'
        shell: msys2 {0}
        run: |
          cmake -S freetype-${{ env.VERSION }} -B build-static \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=clang \
            -DBUILD_SHARED_LIBS=OFF \
            -DFT_DISABLE_BZIP2=ON \
            -DFT_DISABLE_BROTLI=ON \
            -DFT_DISABLE_HARFBUZZ=ON \
            -DFT_DISABLE_PNG=ON \
            -DFT_DISABLE_ZLIB=ON
          cmake --build build-static --config Release

      - name: Build shared library (Windows)
        if: matrix.target == 'x86_64-windows-gnu'
        shell: msys2 {0}
        run: |
          cmake -S freetype-${{ env.VERSION }} -B build-shared \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=clang \
            -DBUILD_SHARED_LIBS=ON \
            -DFT_DISABLE_BZIP2=ON \
            -DFT_DISABLE_BROTLI=ON \
            -DFT_DISABLE_HARFBUZZ=ON \
            -DFT_DISABLE_PNG=ON \
            -DFT_DISABLE_ZLIB=ON
          cmake --build build-shared --config Release

      - name: Collect libraries (Linux)
        if: matrix.target == 'x86_64-linux-gnu'
        run: |
          mkdir staging
          find build-static -name "libfreetype.a" -exec cp {} staging/freetype-${{ matrix.target }}.a \;
          REAL_SO=$(find build-shared -name "libfreetype.so.*.*.*" | head -1)
          cp "$REAL_SO" staging/freetype-${{ matrix.target }}.so

      - name: Collect libraries (macOS)
        if: endsWith(matrix.target, '-macos')
        run: |
          mkdir staging
          find build-static -name "libfreetype.a" -exec cp {} staging/freetype-${{ matrix.target }}.a \;
          REAL_DYLIB=$(find build-shared -name "libfreetype.*.dylib" ! -type l | head -1)
          cp "$REAL_DYLIB" staging/freetype-${{ matrix.target }}.dylib
          install_name_tool -id @executable_path/libfreetype.dylib staging/freetype-${{ matrix.target }}.dylib

      - name: Collect libraries (Windows)
        if: matrix.target == 'x86_64-windows-gnu'
        shell: msys2 {0}
        run: |
          mkdir staging
          find build-static -name "libfreetype.a" -exec cp {} staging/freetype-${{ matrix.target }}.a \;
          find build-shared -name "libfreetype.dll" -exec cp {} staging/freetype-${{ matrix.target }}.dll \;
          find build-shared -name "libfreetype.dll.a" -exec cp {} staging/freetype-${{ matrix.target }}.dll.a \;

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: freetype-${{ matrix.target }}
          path: staging/*

  headers:
    runs-on: ubuntu-latest
    steps:
      - name: Download FreeType source
        run: |
          curl -L -o freetype.tar.gz "https://download.savannah.gnu.org/releases/freetype/freetype-${{ env.VERSION }}.tar.gz"
          tar xzf freetype.tar.gz

      - name: Package headers
        run: |
          cd freetype-${{ env.VERSION }}/include
          tar czf ../../freetype-include.tar.gz .

      - name: Upload headers
        uses: actions/upload-artifact@v4
        with:
          name: freetype-include
          path: freetype-include.tar.gz

  release:
    needs: [build, headers]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List release files
        run: ls -lh artifacts/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: FreeType ${{ env.VERSION }}
          body: |
            FreeType ${{ env.VERSION }} prebuilt binaries.
            Built with clang, GNU ABI on all platforms. No optional dependencies.

            **Headers** — `freetype-include.tar.gz` (all platforms)

            **Static libraries**
            - `freetype-x86_64-linux-gnu.a`
            - `freetype-x86_64-windows-gnu.a`
            - `freetype-x86_64-macos.a`
            - `freetype-aarch64-macos.a`

            **Shared libraries**
            - `freetype-x86_64-linux-gnu.so`
            - `freetype-x86_64-windows-gnu.dll` + `freetype-x86_64-windows-gnu.dll.a` (import library)
            - `freetype-x86_64-macos.dylib`
            - `freetype-aarch64-macos.dylib`
          files: artifacts/*
